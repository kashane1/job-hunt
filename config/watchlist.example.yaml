# config/watchlist.example.yaml
#
# Copy this file to config/watchlist.yaml and populate with your target
# companies. `config/watchlist.yaml` is gitignored (contains target-company
# names, which are PII-adjacent).
#
# Each entry needs at least ONE of greenhouse / lever / ashby / workable /
# careers_url / indeed_search_url / usajobs_search_profile — otherwise it's
# skipped with a warning.

companies:
  - name: "ExampleCo"
    greenhouse: "exampleco"
    lever: "exampleco"
    ashby: "exampleco"
    careers_url: "https://exampleco.com/careers"
    notes: "primary target"
  - name: "AnotherCorp"
    lever: "anothercorp"
    workable: "anothercorp"
  - name: "ThirdCo"
    careers_url: "https://thirdco.com/jobs"
    notes: "generic crawl only"
  - name: "Indeed platform search"
    indeed_search_url: "https://www.indeed.com/jobs?q=senior+platform+engineer&l=Remote&radius=0"
    notes: "batch 4 — one virtual company per saved Indeed search"
  - name: "USAJOBS federal remote"
    usajobs_search_profile: "federal_remote_platform"
    notes: "uses local API credentials plus a named profile below"

usajobs_profiles:
  - name: "federal_remote_platform"
    keyword: "platform engineer"
    location_name: "Washington, District of Columbia"
    results_per_page: 50
    who_may_apply: "Public"
    remote_indicator: true
    fields: "Full"
    date_posted: 14
    sort_field: "openingdate"
    sort_direction: "Desc"

filters:
  # Title OR location must contain at least one keyword (if list non-empty).
  keywords_any:
    - "engineer"
    - "developer"
    - "swe"
  # Any match here excludes the listing. Highest precedence.
  keywords_none:
    - "clearance required"
    - "ts/sci"
    - "relocation required"
    - "principal"
  # Location must contain one of these (if list non-empty).
  locations_any:
    - "remote"
    - "los angeles"
    - "orange county"
    - "san diego"
  # Title must contain one of these (if list non-empty).
  seniority_any:
    - "senior"
    - "staff"
    - "lead "
